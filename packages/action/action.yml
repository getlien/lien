name: 'Lien Review'
description: >-
  Self-contained PR review — complexity analysis, agent bug review, and a summary,
  surfaced as inline PR comments + workflow annotations + a step summary. The
  workflow job is the single status check. No server, no database.
author: 'Lien'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  github-token:
    description: >-
      Token used to clone the PR and post inline comments. Defaults to the
      workflow's built-in GITHUB_TOKEN. Needs contents:read and
      pull-requests:write.
    required: false
    default: ${{ github.token }}
  openrouter-api-key:
    description: >-
      OpenRouter API key for agent review (preferred provider — runs
      OpenRouter's calibrated default model). If omitted, falls back to
      anthropic-api-key, then to complexity-only.
    required: false
    default: ''
  anthropic-api-key:
    description: >-
      Anthropic API key for agent review (fallback when openrouter-api-key is
      not set). If both are omitted, review is complexity-only.
    required: false
    default: ''
  threshold:
    description: 'Complexity threshold above which violations are reported.'
    required: false
    default: '15'
  review-types:
    description: >-
      Comma-separated review types to enable. `complexity` toggles the
      complexity check. `bugs`, `architectural`, and `summary` are all produced
      by the single agent reviewer, so they switch it on/off as a group (and the
      agent only runs when an API key is provided) — they cannot be toggled
      independently of one another. Default: complexity,bugs,summary.
    required: false
    default: 'complexity,bugs,summary'
  block-on-new-errors:
    description: >-
      Post REQUEST_CHANGES (instead of COMMENT) when the PR introduces new
      error-level complexity violations.
    required: false
    default: 'false'
  fail-on:
    description: >-
      Whether the review fails the check (non-zero exit, so a Required check can
      block the PR): 'never' (default — advisory; the review never fails CI),
      'error' (fail on a failure conclusion, i.e. new error-level findings), or
      'any' (fail on any error or warning finding). Opt into gating by setting
      this to 'error' or 'any'.
    required: false
    default: 'never'

outputs:
  conclusion:
    description: 'The review conclusion: success, failure, or neutral.'
  findings-count:
    description: 'Total number of findings produced.'
  error-count:
    description: 'Number of error-severity findings.'
  attestation:
    description: >-
      JSON-encoded delivery attestation (v2): provider health per pass (the
      main review, plus any extra pass like the doc-truth second pass — each
      with its own token budget), what was actually delivered (inline
      comments posted/dropped, annotations, PR description badge), review
      scope, and an overall verdict (delivered / degraded:<reason> /
      failed:<reason>). Observational only — it does not change the exit code
      beyond the existing provider-never-ran behavior.

runs:
  using: 'docker'
  image: 'docker://ghcr.io/getlien/lien-review:v1'
