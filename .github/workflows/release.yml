name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Whether @liendev/parser-native has a version bump waiting to be published
  # in THIS run, decided before changesets/action runs at all.
  #
  # Why not just read changesets/action's own `published`/`publishedPackages`
  # outputs (the `release` job, below)? Those only exist AFTER publish has
  # already happened -- too late to build the per-platform binaries and
  # inject them into packages/parser-native/package.json's
  # optionalDependencies before `changeset publish` packs and publishes it.
  #
  # The heuristic: changesets only ever bumps package.json versions on main
  # via a human merging the auto-opened "Version Packages" PR. By the time
  # that merge lands (which is what triggers a *publishing* run of this
  # workflow, as opposed to a run that opens/updates the Version PR), main's
  # packages/parser-native/package.json version has already diverged from
  # what's live on the registry -- and there are no longer any pending
  # changeset files for it (they were consumed by the version bump). So
  # "local version != registry version" is true exactly on publishing runs
  # that include a parser-native bump, and false otherwise (including on
  # version-PR-opening runs, where main's package.json hasn't moved yet).
  check-parser-native:
    name: Check for pending @liendev/parser-native publish
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.check.outputs.pending }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - id: check
        name: Compare local vs registry version
        run: |
          set -euo pipefail
          LOCAL_VERSION="$(node -p "require('./packages/parser-native/package.json').version")"
          REGISTRY_VERSION="$(npm view --registry https://registry.npmjs.org/ @liendev/parser-native version 2>/dev/null || true)"
          echo "packages/parser-native: local=$LOCAL_VERSION registry=${REGISTRY_VERSION:-<not published>}"
          if [ "$LOCAL_VERSION" != "$REGISTRY_VERSION" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

  # Builds the per-platform binaries this run needs to publish, only when
  # check-parser-native found a pending bump.
  build-native:
    name: Build native parser binaries
    needs: check-parser-native
    if: needs.check-parser-native.outputs.pending == 'true'
    uses: ./.github/workflows/build-native.yml
    with:
      platforms: all

  release:
    name: Release
    needs: [check-parser-native, build-native]
    # `build-native` is skipped entirely (not merely a no-op run) on any run
    # where parser-native isn't being published -- plain `needs:` would then
    # skip this job too, so the condition is spelled out by hand instead of
    # relying on the default "all needs succeeded" behavior.
    if: |
      always() &&
      needs.check-parser-native.result == 'success' &&
      (needs.build-native.result == 'success' || needs.build-native.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Create releases
      pull-requests: write # Create "Version Packages" PR
      id-token: write # OIDC for npm provenance
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published-packages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          # Don't set registry-url - npm will use OIDC automatically with publishConfig.provenance

      # OIDC trusted publishing requires npm 11.5.1+ (the runner's Node 22
      # bundled npm is 10.9.x). Pin to a specific 11.x rather than @latest —
      # plain `npm install -g npm@latest` has hit a self-upgrade crash on the
      # hosted runner image (`Cannot find module 'promise-retry'` from inside
      # @npmcli/arborist), and pinning makes the install deterministic.
      - name: Install npm 11.x for OIDC trusted publishing
        run: npm install -g npm@11.5.1

      - name: Configure npm scope
        run: |
          echo "@liendev:registry=https://registry.npmjs.org/" >> ~/.npmrc

      - run: npm ci
      - run: npm run build

      # The two steps below only run when check-parser-native found a
      # pending @liendev/parser-native publish, and MUST run before
      # changesets/action (next step): `changeset publish` packs
      # packages/parser-native/package.json exactly as it finds it on disk,
      # so the optionalDependencies injection has to already be there by the
      # time that step runs. Publishing the per-platform packages first,
      # then injecting them into the main package's optionalDependencies,
      # mirrors what @napi-rs/cli's "napi prepublish" does for other
      # native-addon projects -- this repo hand-rolls the equivalent per
      # ADR-013's "no @napi-rs/cli" decision.
      #
      # NOTE: each new @liendev/parser-native-<platform> package name must
      # already have npm trusted publishing configured for this repo+
      # workflow (the same OIDC mechanism the main packages use) before its
      # very first publish -- that's a one-time, manual npmjs.org setup step
      # for whoever administers the @liendev org, not something this
      # workflow can bootstrap on its own.
      - name: Download native parser platform binaries
        if: needs.check-parser-native.outputs.pending == 'true'
        uses: actions/download-artifact@v4
        with:
          path: packages/parser-native/artifacts

      - name: Publish per-platform parser-native packages
        if: needs.check-parser-native.outputs.pending == 'true'
        run: node scripts/publish-platform-packages.mjs --artifacts-dir artifacts
        working-directory: packages/parser-native

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
          title: 'chore: version packages'
          commit: 'chore: version packages'
          # Push via the GitHub Contents API so commits/tags are auto-signed
          # by the GITHUB_TOKEN's owner. Required by the main-branch
          # `required_signatures` ruleset — without this, the auto-opened
          # Version Packages PR lands with unsigned commits and can't merge.
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN needed - uses OIDC provenance

  registry-smoke:
    name: Post-publish registry smoke test
    needs: release
    # !cancelled() is load-bearing: build-native (a transitive dependency
    # via `release`) is skipped on releases with no pending parser-native
    # publish, and GitHub skips downstream jobs with any skipped transitive
    # need unless the job's `if` opts out — without this, the smoke test
    # silently skipped on exactly the releases it exists to validate
    # (observed on 0.61.0 and 0.62.0).
    if: ${{ !cancelled() && needs.release.result == 'success' && needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # `release`, above, only ever installs @liendev/* from the local npm
    # workspace (via `npm ci`) and the CI `release-smoke-test` job
    # (.github/workflows/ci.yml) only ever installs packed LOCAL tarballs —
    # neither can detect resolution skew against what's actually live on the
    # registry. That blind spot is exactly what shipped @liendev/core
    # 0.55.0/0.56.0: they imported `getIndexDir` from @liendev/parser, but
    # parser had not been republished with that export, so every fresh
    # `npx @liendev/lien@latest serve` crashed at startup with a
    # missing-export SyntaxError. This job installs the version(s) that were
    # JUST published FROM THE REGISTRY, in a directory with no workspace or
    # lockfile to fall back on, and boot-probes the result — the same path a
    # real first-time `npx @liendev/lien` user takes. A red job here is a
    # post-publish alarm: the release cannot be rolled back (npm publishes
    # are immutable), so the manual remediation is `npm deprecate` on the
    # broken version(s) (see the script's failure banner) followed by a
    # fixed patch release.
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run registry smoke test
        env:
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.published-packages }}
        run: .github/scripts/registry-smoke.sh
