name: Publish Action

# Builds and pushes the Lien Review GitHub Action image to GHCR, then (once a
# human has provisioned the dist repo + token, see packages/action/README.md
# "Publishing the Action") syncs action.yml + README to the public
# getlien/lien-review dist repo and moves the floating v1 tag so
# `uses: getlien/lien-review@v1` resolves to the new release.
#
# Trigger note: this repo releases via changesets (see .github/workflows/
# release.yml), which tags pushes as `<pkg>@<version>` (e.g.
# `@liendev/lien@0.51.0`), never a bare `v*` tag — so a `v*` trigger would
# never fire. `@liendev/parser`, `@liendev/core`, and `@liendev/lien` are
# version-linked (.changeset/config.json), so every monorepo release bumps
# `@liendev/lien` and creates that tag exactly once. We piggyback on it rather
# than adding a dedicated `@liendev/action` tag, because `packages/action` and
# `packages/review` are private/unpublished and changesets' default
# `privatePackages.tag: false` means changesets never tags them (see
# https://github.com/changesets/changesets/blob/main/docs/config-file-options.md) —
# wiring a dedicated tag would mean changing shared `.changeset/config.json`
# behavior for every private package, out of scope here.
#
# Caveat: an action-only change that doesn't also bump the CLI's version won't
# trigger this automatically. Use workflow_dispatch to publish it manually
# until/unless we add a dedicated tag (see the README runbook).

on:
  push:
    tags:
      - '@liendev/lien@*'
  workflow_dispatch:

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Actions pinned to commit SHAs (supply-chain hardening for a job that
      # publishes artifacts). persist-credentials:false — this job never needs
      # the checkout token for a push, so don't leave it in local git config.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve tags
        id: tags
        run: |
          IMAGE=ghcr.io/getlien/lien-review
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tagged release: publish the version, the floating major (:v1) and
            # :latest, and the sha tag. The tag is `@liendev/lien@<version>` —
            # strip everything up to the last '@' to get the bare semver
            # (Docker tags can't contain '@' or '/').
            VERSION="${GITHUB_REF##*@}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:${VERSION}"
              # :v1 is the Action's own public-interface major version (its
              # inputs/outputs contract), not derived from the CLI's semver —
              # bump it manually (v2, ...) only on a breaking action.yml
              # change, the same convention as actions/checkout@v4 et al.
              echo "${IMAGE}:v1"
              echo "${IMAGE}:latest"
              echo "${SHA_TAG}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: publish ONLY the immutable sha tag, so a non-release
            # run can never overwrite :latest, :v1, or a version with an arbitrary commit.
            echo "version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            {
              echo "tags<<EOF"
              echo "${SHA_TAG}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push action image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/action/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=action
          cache-to: type=gha,mode=max,scope=action

      # ─── Sync to the public dist repo ────────────────────────────────────────
      #
      # The action.yml consumers reference via `uses: getlien/lien-review@v1` lives
      # in the public getlien/lien-review dist repo, NOT this monorepo. After the
      # image is pushed above, that repo's action.yml + README must be synced and
      # the floating `v1` tag moved to the new release commit.
      #
      # This needs a GH_DIST_TOKEN secret (a PAT/fine-grained token with
      # contents:write on getlien/lien-review) plus that repo existing — both are
      # human, one-time setup steps (see packages/action/README.md "Publishing
      # the Action"). Until then this step no-ops with a clear log line instead
      # of failing the build, so the image publish above still succeeds and this
      # workflow is mergeable before that setup happens.
      - name: Sync action.yml + README to dist repo and move v1 tag
        if: github.event_name == 'push'
        env:
          GH_DIST_TOKEN: ${{ secrets.GH_DIST_TOKEN }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${GH_DIST_TOKEN:-}" ]; then
            echo "::notice::GH_DIST_TOKEN is not set — skipping the getlien/lien-review dist-repo sync. The GHCR image was published above, but 'uses: getlien/lien-review@v1' will not resolve to it yet. See packages/action/README.md 'Publishing the Action' for the one-time human setup (create the dist repo + add the secret), then re-run this workflow via workflow_dispatch."
            exit 0
          fi

          git clone "https://x-access-token:${GH_DIST_TOKEN}@github.com/getlien/lien-review.git" dist
          # Copy the published action definition + docs (the image holds the code).
          cp packages/action/action.yml dist/action.yml
          cp packages/action/README.md  dist/README.md

          cd dist
          git config user.name  "lien-bot"
          git config user.email "bot@lien.dev"
          git add action.yml README.md
          git commit -m "release: ${VERSION}" || echo "no changes to commit"
          git push origin HEAD:main

          # Pin the exact version tag and move the floating major tag (see the
          # ":v1" comment in the "Resolve tags" step above for why this is the
          # literal "v1", not derived from $VERSION).
          git tag -f "$VERSION"
          git tag -f "v1"
          git push -f origin "$VERSION"
          git push -f origin "v1"
