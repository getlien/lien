name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI Platform]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  resolve-sha:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA::7}" >> "$GITHUB_OUTPUT"

  build-platform:
    needs: resolve-sha
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Auth DOCR
        run: doctl registry login --expiry-seconds 1800

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push platform image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          file: platform/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.digitalocean.com/getlien/lien-platform:sha-${{ needs.resolve-sha.outputs.sha_short }}
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

  build-runner:
    needs: resolve-sha
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Auth DOCR
        run: doctl registry login --expiry-seconds 1800

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.digitalocean.com/getlien/lien-runner:sha-${{ needs.resolve-sha.outputs.sha_short }}
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

  deploy:
    needs: [resolve-sha, build-platform, build-runner]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Read Terraform outputs
        working-directory: platform/.infra/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          terraform init -input=false
          terraform refresh -input=false -target=module.databases
          PG_PASSWORD=$(terraform output -raw pg_password)
          VALKEY_PASSWORD=$(terraform output -raw valkey_password)
          echo "::add-mask::$PG_PASSWORD"
          echo "::add-mask::$VALKEY_PASSWORD"
          echo "PG_HOST=$(terraform output -raw pg_host)" >> "$GITHUB_ENV"
          echo "PG_PORT=$(terraform output -raw pg_port)" >> "$GITHUB_ENV"
          echo "PG_DATABASE=$(terraform output -raw pg_database)" >> "$GITHUB_ENV"
          echo "PG_USER=$(terraform output -raw pg_user)" >> "$GITHUB_ENV"
          echo "PG_PASSWORD=$PG_PASSWORD" >> "$GITHUB_ENV"
          echo "VALKEY_HOST=$(terraform output -raw valkey_host)" >> "$GITHUB_ENV"
          echo "VALKEY_PORT=$(terraform output -raw valkey_port)" >> "$GITHUB_ENV"
          echo "VALKEY_USER=$(terraform output -raw valkey_user)" >> "$GITHUB_ENV"
          echo "VALKEY_PASSWORD=$VALKEY_PASSWORD" >> "$GITHUB_ENV"
          echo "K8S_CLUSTER_NAME=$(terraform output -raw k8s_cluster_name)" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save $K8S_CLUSTER_NAME

      - name: Build kustomize manifests
        run: |
          export IMAGE_TAG="sha-${{ needs.resolve-sha.outputs.sha_short }}"
          export PG_HOST PG_PORT PG_DATABASE VALKEY_HOST VALKEY_PORT
          kubectl kustomize platform/.infra/k8s/overlays/production \
            | envsubst '${PG_HOST} ${PG_PORT} ${PG_DATABASE} ${VALKEY_HOST} ${VALKEY_PORT} ${IMAGE_TAG}' \
            | sed -E 's/^([[:space:]]+[A-Z_]+:[[:space:]]+)([0-9]+)$/\1"\2"/' \
            > /tmp/manifests.yaml

      - name: Create/update secret
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          LIEN_SERVICE_TOKEN: ${{ secrets.LIEN_SERVICE_TOKEN }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cat > /tmp/secret.env <<EOF
          APP_KEY=$APP_KEY
          DB_USERNAME=$PG_USER
          DB_PASSWORD=$PG_PASSWORD
          REDIS_USERNAME=$VALKEY_USER
          REDIS_PASSWORD=$VALKEY_PASSWORD
          GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID
          GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET
          GITHUB_REDIRECT_URI=https://app.lien.dev/auth/github/callback
          LIEN_SERVICE_TOKEN=$LIEN_SERVICE_TOKEN
          GH_APP_ID=$GH_APP_ID
          GH_APP_PRIVATE_KEY=$GH_APP_PRIVATE_KEY
          GH_WEBHOOK_SECRET=$GH_WEBHOOK_SECRET
          EOF
          kubectl create secret generic laravel-secret \
            --namespace=lien \
            --from-env-file=/tmp/secret.env \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/secret.env
          cat > /tmp/runner-secret.env <<EOF
          OPENROUTER_API_KEY=$OPENROUTER_API_KEY
          EOF
          kubectl create secret generic runner-secret \
            --namespace=lien \
            --from-env-file=/tmp/runner-secret.env \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/runner-secret.env

      - name: Deploy
        id: deploy
        run: |
          kubectl delete job/nats-setup job/laravel-migrate -n lien --ignore-not-found --wait=true
          kubectl apply -f /tmp/manifests.yaml
          kubectl rollout status statefulset/nats -n lien --timeout=120s

          # Wait for NATS setup and migrations in parallel
          kubectl wait --for=condition=complete job/nats-setup -n lien --timeout=120s &
          PID_NATS=$!
          kubectl wait --for=condition=complete job/laravel-migrate -n lien --timeout=180s &
          PID_MIGRATE=$!
          wait $PID_NATS
          wait $PID_MIGRATE

          kubectl rollout restart deployment/laravel deployment/laravel-worker deployment/runner -n lien
          kubectl rollout status deployment/laravel -n lien --timeout=180s
          kubectl rollout status deployment/laravel-worker -n lien --timeout=120s
          kubectl rollout status deployment/runner -n lien --timeout=120s

      - name: Health check
        id: healthcheck
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl --max-time 30 -s -o /dev/null -w "%{http_code}" https://app.lien.dev/up)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (200) on attempt $i"
              exit 0
            fi
            echo "Health check attempt $i: $STATUS"
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: steps.deploy.outcome == 'failure' || steps.healthcheck.outcome == 'failure'
        run: |
          echo "==> Rolling back deployments..."
          kubectl rollout undo deployment/laravel -n lien
          kubectl rollout undo deployment/laravel-worker -n lien
          kubectl rollout undo deployment/runner -n lien
          kubectl rollout status deployment/laravel -n lien --timeout=120s
          echo "==> Rollback complete."
