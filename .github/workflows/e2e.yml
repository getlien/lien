name: E2E Tests (Real Projects)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

  # Allow manual trigger -- runs the full 12-project suite under native,
  # same as every other trigger (see plan-e2e-matrix.mjs; ADR-013 Phase 4-B
  # retired the legacy backend, so there's no longer a mode to select).
  workflow_dispatch: {}

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-trigger:
    name: Check E2E trigger
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ github.event_name == 'workflow_dispatch' || steps.check.outputs.has-changeset == 'true' || steps.label.outputs.has-label == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for e2e label
        id: label
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'e2e') }}" == "true" ]]; then
            echo "has-label=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changeset files in PR
        id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep -vE '^\.changeset/README\.md$' | grep -qE '^\.changeset/.+\.md$'; then
            echo "has-changeset=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changeset=false" >> "$GITHUB_OUTPUT"
          fi

  plan-matrix:
    name: Plan E2E matrix
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Computes the project/language matrix from
      # .github/scripts/plan-e2e-matrix.mjs: every trigger (PR or
      # workflow_dispatch) runs the full 12-project suite once, under
      # LIEN_PARSER=native -- see that script's header (ADR-013 Phase 4-B
      # retired the legacy backend, so there's no mode axis left to plan).
      - id: plan
        run: node .github/scripts/plan-e2e-matrix.mjs

  e2e-tests-parallel:
    name: E2E - ${{ matrix.project }} (${{ matrix.language }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [check-trigger, plan-matrix]
    if: needs.check-trigger.outputs.should-run == 'true'

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The compiled binary is loaded via index.js's local-dev fallback path
      # (see CONTRIBUTING.md) -- always needed now that native is the only
      # backend.
      - name: Cache Rust build (parser-native)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/parser-native
          shared-key: parser-native

      - name: Build native parser
        run: npm run build:native -w @liendev/parser-native

      - name: Build Lien
        run: npm run build

      - name: Run E2E test for ${{ matrix.project }}
        run: npm run ${{ matrix.script }} --workspace=packages/cli
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          LIEN_PARSER: ${{ matrix.mode }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.language }}-${{ matrix.mode }}-artifacts
          path: |
            /tmp/lien-e2e-tests/
          retention-days: 7
