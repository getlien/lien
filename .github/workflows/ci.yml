name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Rust build (parser-native)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/parser-native
          shared-key: parser-native

      # Builds packages/parser-native's Rust crate to ./parser-native.node
      # (vendors + patches tree-sitter-kotlin, then `cargo build --release`).
      # Must run before "Run tests (Parser Native)" below -- that suite loads
      # the compiled binary via index.js's local-dev fallback path. GitHub's
      # ubuntu-latest runner ships a stable Rust toolchain preinstalled, so
      # no separate toolchain-install step is needed. Not part of
      # `npm run build` (see packages/parser-native/package.json's `build`
      # script, a deliberate no-op) since Phase 1 doesn't wire any other
      # package to depend on this one yet -- see ADR-013.
      - name: Build native parser
        run: npm run build:native -w @liendev/parser-native

      - name: Format check
        run: npm run format:check

      - name: Build Parser, Core & Review (required by CLI & Action)
        run: npm run build -w @liendev/parser && npm run build -w @liendev/core && npm run build -w @liendev/review

      - name: Lint
        run: npm run lint

      - name: Type check (CLI)
        run: npm run typecheck --workspace=packages/cli

      - name: Type check (Review)
        run: npm run typecheck --workspace=packages/review

      - name: Type check (Action)
        run: npm run typecheck --workspace=packages/action

      - name: Run tests (Parser)
        run: npm run test --workspace=packages/parser

      - name: Run tests (Parser Native)
        run: npm run test --workspace=packages/parser-native

      - name: Run tests (Core)
        run: npm run test --workspace=packages/core

      - name: Run tests (CLI)
        run: npm run test --workspace=packages/cli

      - name: Run tests (Review)
        run: npm run test --workspace=packages/review

      - name: Run tests (Action)
        run: npm run test --workspace=packages/action

      - name: Build all packages
        run: npm run build

      - name: Test CLI
        run: |
          node packages/cli/dist/index.js --version
          node packages/cli/dist/index.js --help

      - name: Build Action image (Dockerfile smoke test)
        run: docker build -f packages/action/Dockerfile -t lien-review:ci .

  test-native:
    name: Run tests (LIEN_PARSER=native)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ADR-013 Phase 3 ("flagged swap -- CI runs both modes"): build-and-test
    # above runs the full suite under the default LIEN_PARSER=legacy backend.
    # This job is the native-backend counterpart, required (no
    # continue-on-error) exactly like build-and-test. It's a dedicated job
    # rather than a `parser-mode` matrix axis on build-and-test because most
    # of that job's steps -- format/lint/typecheck, the full `npm run build`,
    # the CLI smoke test, the Action Docker build -- are parser-backend
    # independent; matrixing the whole job would double all of that on every
    # push/PR for zero extra coverage. This job instead reuses only the setup
    # `npm test` actually needs: the compiled native binary (loaded via
    # index.js's local-dev fallback path) and a built parser/core/review
    # (CLI and Action resolve those via `dist/`, same as build-and-test's
    # "Build Parser, Core & Review" step) -- then runs the whole workspace
    # test suite once under LIEN_PARSER=native.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Rust build (parser-native)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/parser-native
          shared-key: parser-native

      - name: Build native parser
        run: npm run build:native -w @liendev/parser-native

      - name: Build Parser, Core & Review (required by CLI & Action)
        run: npm run build -w @liendev/parser && npm run build -w @liendev/core && npm run build -w @liendev/review

      - name: Run tests (LIEN_PARSER=native)
        run: npm test
        env:
          LIEN_PARSER: native

  delta:
    name: Complexity delta vs base branch (lien delta --base)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    # `lien delta` is the sixth pre-commit gate (see CLAUDE.md), but until now
    # it only ran on an agent's honor system -- nothing stopped a PR whose
    # commits raised a function's complexity over threshold from merging, as
    # long as no individual commit happened to run the gate locally. This job
    # gives the gate a CI backstop: it compares the checked-out PR state
    # against the PR's target branch (not just the PR's own last commit, which
    # a crossing introduced earlier in the same PR could hide from) and fails
    # the build on any NEW threshold crossing.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need the target branch's history locally (as `origin/<base>`) to
          # diff against -- a shallow, single-ref checkout would not have it.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Parser, Core & CLI (required by lien delta)
        run: npm run build:core && npm run build -w packages/cli

      - name: lien delta --base origin/<target-branch>
        run: node packages/cli/dist/index.js delta --base "origin/$GITHUB_BASE_REF"

  release-smoke-test:
    name: Release smoke test (npm pack -> external install)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    # Every other job installs via the npm workspace protocol (`npm ci` at
    # the repo root), which resolves @liendev/core and @liendev/parser from
    # the local workspace and never touches the public registry for our own
    # packages. That means a phantom/unpublished/private dependency in
    # packages/cli/package.json (like the @liendev/review dependency that
    # broke `npm install` for real users until #620) is invisible to CI.
    # This job packs the CLI exactly as it will be published and installs
    # the tarball into a scratch project with no workspace and no monorepo
    # lockfile -- the same resolution path an external `npm install
    # @liendev/lien` gets -- so a phantom dependency fails the PR instead of
    # shipping.
    #
    # It packs and installs all four PUBLISHED packages together (parser,
    # core, lien, parser-native), not just the CLI. A real release publishes
    # them together -- all four are in the same `.changeset/config.json`
    # linked group, so parser-native bumps to the group's max version and
    # republishes on every release that bumps any linked package, not on a
    # schedule of its own -- so the CLI's @liendev/* sibling deps should
    # resolve to those local tarballs, not whatever's currently live on the
    # registry. Packing only the CLI made "new CLI + old published
    # core/parser" -- a combination that can't happen in production -- the
    # thing this job tested, which false-positived on any PR adding a new
    # cross-package export (see #644: core shipped `NullEmbeddings` but the
    # CLI resolved the older, still-published core without it). review,
    # action, and site are private and intentionally excluded: if the CLI
    # ever depends on one of them again, it still has to resolve from the
    # registry and 404, preserving the #620 detection this job exists for.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Rust build (parser-native)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/parser-native
          shared-key: parser-native

      - name: Build native parser
        run: npm run build:native -w @liendev/parser-native

      - name: Build packages required for the CLI tarball
        run: npm run build:core && npm run build -w packages/cli

      # Produces a real, installable @liendev/parser-native-linux-x64-gnu
      # tarball from the binary built above, WITHOUT touching the npm
      # registry or packages/parser-native/package.json (that mutation only
      # happens for real in release.yml, at publish time -- see this
      # script's own header). This lets the install step below exercise
      # index.js's platform-package resolution path (resolution order #1 in
      # packages/parser-native/index.js), not just its local-binary fallback
      # (#2) -- the two are easy to conflate, and only the first is what a
      # real end user installing from npm actually hits.
      - name: Generate local linux-x64-gnu platform package (pack-only)
        run: |
          node scripts/publish-platform-packages.mjs \
            --pack-only \
            --platform linux-x64-gnu \
            --binary "$(pwd)/parser-native.node"
        working-directory: packages/parser-native

      - name: Pack published packages (parser, core, lien, parser-native)
        run: npm pack -w @liendev/parser -w @liendev/core -w @liendev/lien -w @liendev/parser-native

      - name: Install tarballs together as an external consumer
        run: |
          set -euo pipefail
          PARSER_TARBALL="$(pwd)/$(ls liendev-parser-[0-9]*.tgz)"
          CORE_TARBALL="$(pwd)/$(ls liendev-core-*.tgz)"
          CLI_TARBALL="$(pwd)/$(ls liendev-lien-*.tgz)"
          PARSER_NATIVE_TARBALL="$(pwd)/$(ls liendev-parser-native-[0-9]*.tgz)"
          PLATFORM_TARBALL="$(pwd)/$(ls packages/parser-native/platform-packages/linux-x64-gnu/liendev-parser-native-linux-x64-gnu-*.tgz)"
          SCRATCH="$(mktemp -d)"
          echo "SCRATCH_DIR=$SCRATCH" >> "$GITHUB_ENV"
          cd "$SCRATCH"
          npm init -y >/dev/null
          npm install "$PARSER_TARBALL" "$CORE_TARBALL" "$CLI_TARBALL" "$PARSER_NATIVE_TARBALL" "$PLATFORM_TARBALL"

      - name: Run the installed CLI binary
        run: |
          set -euo pipefail
          "$SCRATCH_DIR/node_modules/.bin/lien" --version
          "$SCRATCH_DIR/node_modules/.bin/lien" --help

      # Proves the loader actually resolved the just-installed platform
      # package (resolution order #1), not the local-binary fallback (#2) --
      # see the probe script's own header for why it targets
      # @liendev/parser-native directly rather than @liendev/parser.
      - name: Probe native parser platform-package resolution
        run: node "$GITHUB_WORKSPACE/.github/scripts/probe-parser-native-platform-package.mjs"
        working-directory: ${{ env.SCRATCH_DIR }}

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # packages/site is a workspace but is NOT part of the root `build`
    # script, so a broken VitePress build (bad frontmatter, a dead internal
    # link, a markdown-it/mermaid plugin error) only ever surfaced after
    # merge, on the push-to-main deploy-docs.yml run. Wiring the same build
    # command into this PR-triggered workflow catches it before merge.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs (VitePress)
        run: npm run docs:build
