name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Build Parser, Core & Review (required by CLI & Action)
        run: npm run build -w @liendev/parser && npm run build -w @liendev/core && npm run build -w @liendev/review

      - name: Lint
        run: npm run lint

      - name: Type check (CLI)
        run: npm run typecheck --workspace=packages/cli

      - name: Type check (Review)
        run: npm run typecheck --workspace=packages/review

      - name: Type check (Action)
        run: npm run typecheck --workspace=packages/action

      - name: Run tests (Parser)
        run: npm run test --workspace=packages/parser

      - name: Run tests (Core)
        run: npm run test --workspace=packages/core

      - name: Run tests (CLI)
        run: npm run test --workspace=packages/cli

      - name: Run tests (Review)
        run: npm run test --workspace=packages/review

      - name: Run tests (Action)
        run: npm run test --workspace=packages/action

      - name: Build all packages
        run: npm run build

      - name: Test CLI
        run: |
          node packages/cli/dist/index.js --version
          node packages/cli/dist/index.js --help

      - name: Build Action image (Dockerfile smoke test)
        run: docker build -f packages/action/Dockerfile -t lien-review:ci .

  release-smoke-test:
    name: Release smoke test (npm pack -> external install)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    # Every other job installs via the npm workspace protocol (`npm ci` at
    # the repo root), which resolves @liendev/core and @liendev/parser from
    # the local workspace and never touches the public registry for our own
    # packages. That means a phantom/unpublished/private dependency in
    # packages/cli/package.json (like the @liendev/review dependency that
    # broke `npm install` for real users until #620) is invisible to CI.
    # This job packs the CLI exactly as it will be published and installs
    # the tarball into a scratch project with no workspace and no monorepo
    # lockfile -- the same resolution path an external `npm install
    # @liendev/lien` gets -- so a phantom dependency fails the PR instead of
    # shipping.
    #
    # It packs and installs all three PUBLISHED packages together (parser,
    # core, lien), not just the CLI. A real release publishes them together
    # (version-linked by changesets), so the CLI's @liendev/* sibling deps
    # should resolve to those local tarballs, not whatever's currently live
    # on the registry. Packing only the CLI made "new CLI + old published
    # core/parser" -- a combination that can't happen in production -- the
    # thing this job tested, which false-positived on any PR adding a new
    # cross-package export (see #644: core shipped `NullEmbeddings` but the
    # CLI resolved the older, still-published core without it). review,
    # action, and site are private and intentionally excluded: if the CLI
    # ever depends on one of them again, it still has to resolve from the
    # registry and 404, preserving the #620 detection this job exists for.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages required for the CLI tarball
        run: npm run build:core && npm run build -w packages/cli

      - name: Pack published packages (parser, core, lien)
        run: npm pack -w @liendev/parser -w @liendev/core -w @liendev/lien

      - name: Install tarballs together as an external consumer
        run: |
          set -euo pipefail
          PARSER_TARBALL="$(pwd)/$(ls liendev-parser-*.tgz)"
          CORE_TARBALL="$(pwd)/$(ls liendev-core-*.tgz)"
          CLI_TARBALL="$(pwd)/$(ls liendev-lien-*.tgz)"
          SCRATCH="$(mktemp -d)"
          echo "SCRATCH_DIR=$SCRATCH" >> "$GITHUB_ENV"
          cd "$SCRATCH"
          npm init -y >/dev/null
          npm install "$PARSER_TARBALL" "$CORE_TARBALL" "$CLI_TARBALL"

      - name: Run the installed CLI binary
        run: |
          set -euo pipefail
          "$SCRATCH_DIR/node_modules/.bin/lien" --version
          "$SCRATCH_DIR/node_modules/.bin/lien" --help

  docs-build:
    name: Docs build (VitePress)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # packages/site is a workspace but is NOT part of the root `build`
    # script, so a broken VitePress build (bad frontmatter, a dead internal
    # link, a markdown-it/mermaid plugin error) only ever surfaced after
    # merge, on the push-to-main deploy-docs.yml run. Wiring the same build
    # command into this PR-triggered workflow catches it before merge.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs (VitePress)
        run: npm run docs:build
