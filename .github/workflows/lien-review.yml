name: Lien Review

# Dogfoods the Lien Review action on this monorepo's own PRs.
#
# The action posts no Checks API check run of its own — this workflow job is the
# single status check. Findings surface as workflow annotations (inline on the
# diff), inline PR comments, and a step summary.
#
# The public, external-consumer path is `uses: getlien/lien-review@v1` (a Docker
# action backed by a prebuilt GHCR image — see packages/action/README.md). Both
# the image and the public dist repo are published; this monorepo still builds
# the action from source and runs its entrypoint directly on purpose, so CI
# dogfoods the current commit instead of the last released tag. Same code
# path either way, so this isn't a stand-in for the real thing.
#
# The review is advisory by default (fail-on defaults to 'never'), so the check
# stays green whenever the action *runs*; findings show as annotations + comments.
# Set fail-on: error/any here (or in any consumer workflow) to gate the PR.
#
# `types` is pinned explicitly rather than left as GitHub's pull_request default
# (opened/synchronize/reopened) so nobody can widen it to `edited` without
# noticing the footgun: the review engine unconditionally rewrites the PR body's
# `<!-- lien:* -->` stats section on every run (updatePRDescription() in
# packages/review/src/github-api.ts), so an `edited`-triggered rerun would
# re-edit the body, re-trigger itself, and loop indefinitely at ~one review's
# wall-clock time per cycle. `ready_for_review` is added on top of the default
# set so a draft PR marked ready without a new commit still gets reviewed.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lien-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # reviewPullRequest() (packages/action -> @liendev/review) parses the
      # PR's changed files via performChunkOnlyIndex/chunkFile, which now
      # requires the native binding -- see ci.yml's build-and-test job for
      # the same steps. Without this, ADR-013 Phase 4-B's fail-fast
      # NativeBindingLoadError crashes every review run.
      - name: Cache Rust build (parser-native)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/parser-native
          shared-key: parser-native

      - name: Build native parser
        run: npm run build:native -w @liendev/parser-native

      - name: Build review engine + action
        run: npm run build -w @liendev/parser -w @liendev/core -w @liendev/review -w @liendev/action

      - name: Run Lien Review
        run: node packages/action/dist/index.js
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Dedicated candidate-loop passes (stale-duplicate-pass.ts,
          # incomplete-handling-pass.ts) — dark/opt-in for @liendev/review
          # consumers by default; this repo's own reviews opt in here to
          # dogfood them (see docs/architecture/review-pass-architecture.md's
          # status line for the mechanism and evidence status). Both gates
          # read these env vars directly via process.env — no action.yml
          # input plumbing needed.
          LIEN_STALE_DUP_PASS: 'on'
          LIEN_INCOMPLETE_PASS: 'on'
          # docs-drift-pass.ts — same dark/opt-in mechanism as the two above;
          # this repo opts in as of 2026-07-23 to dogfood it on its own PRs.
          # Still dark/off for every other @liendev/review / @liendev/action
          # consumer. A synthetic calibration run scored 1/10 against the
          # prod default model (see the status line + docs-drift subsection
          # in docs/architecture/review-pass-architecture.md, and the
          # fixture's own assertions header) — dark mechanism proven via
          # unit tests independent of that score; this opt-in is itself the
          # real-PR evidence-gathering step, not a claim of a passed bar.
          LIEN_DOCS_DRIFT_PASS: 'on'
