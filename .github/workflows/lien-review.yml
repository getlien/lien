name: Lien Review

# Dogfoods the Lien Review action on this monorepo's own PRs.
#
# The action posts no Checks API check run of its own — this workflow job is the
# single status check. Findings surface as workflow annotations (inline on the
# diff), inline PR comments, and a step summary.
#
# The public, external-consumer path is `uses: getlien/lien-review@v1` (a Docker
# action backed by a prebuilt GHCR image — see packages/action/README.md). That
# image + the public dist repo aren't published yet, so here we build the action
# from source and run its entrypoint directly. Same code path, no publish needed.
#
# The review is advisory by default (fail-on defaults to 'never'), so the check
# stays green whenever the action *runs*; findings show as annotations + comments.
# Set fail-on: error/any here (or in any consumer workflow) to gate the PR.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lien-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build review engine + action
        run: npm run build -w @liendev/parser -w @liendev/core -w @liendev/review -w @liendev/action

      - name: Run Lien Review
        run: node packages/action/dist/index.js
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # TEMP DEBUG (revert before merge): log per-turn agent reasoning/output
          # to diagnose the "No JSON output — 0 findings" silent failure on this PR.
          LIEN_REVIEW_LOG_AGENT: '1'
