apiVersion: batch/v1
kind: Job
metadata:
  name: laravel-migrate
  namespace: lien
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: laravel-migrate
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$POSTGRES_USER" -d "$DB_DATABASE"; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: laravel-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: laravel-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: laravel-config
                  key: DB_DATABASE
            - name: PGSSLMODE
              valueFrom:
                configMapKeyRef:
                  name: laravel-config
                  key: DB_SSLMODE
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: laravel-secret
                  key: DB_USERNAME
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: migrate
          image: lien-platform:latest
          imagePullPolicy: Never
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: laravel-config
            - secretRef:
                name: laravel-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
